name: Bug report
description: Report something that does not work as documented.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
        Please do **not** report security vulnerabilities here — see SECURITY.md.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include exact inputs.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages and logs (with secrets redacted).
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Civitas version / commit
      placeholder: e.g. v0.1.0 or abc1234
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser (if relevant), Postgres version.
      placeholder: e.g. Ubuntu 24.04, Firefox 132, Postgres 16.4
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help — screenshots, related issues.
    validations:
      required: false
