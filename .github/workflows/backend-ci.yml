name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: civitas
          POSTGRES_PASSWORD: civitas
          POSTGRES_DB: civitas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U civitas"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://civitas:civitas@localhost:5432/civitas_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Run tests
        # SQLX_OFFLINE uses the committed .sqlx/ cache for compile-time
        # query checking; the integration tests apply migrations to the
        # running Postgres at runtime via civitas_db::migrate().
        run: cargo test --workspace --all-features --no-fail-fast

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        # RUSTSEC-2023-0071 (rsa "Marvin Attack"): no upstream fix.
        # The advisory crate is pulled in transitively via `sqlx-mysql`,
        # which is *never compiled* because our sqlx config sets
        # default-features = false and enables only the `postgres` backend.
        # Re-evaluate when the rsa crate ships a fix.
        run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071
