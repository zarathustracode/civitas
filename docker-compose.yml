# Local development compose stack.
# Production deployments use a different stack (see docker/ for build images).
#
# Usage:
#   docker compose up -d db        # start Postgres in background
#   docker compose up -d mailpit   # start the dev mail catcher (UI on :8025)
#   docker compose stop db         # pause it
#   docker compose down -v         # remove containers AND data (destructive)
#
# `name:` pins the Compose project to civitas-dev so this stack cannot collide
# with the prod compose in docker/ (which uses project name `civitas`).

name: civitas-dev

services:
  db:
    image: postgres:16-alpine
    container_name: civitas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: civitas
      POSTGRES_PASSWORD: civitas
      POSTGRES_DB: civitas
    ports:
      - "5432:5432"
    volumes:
      - civitas-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civitas -d civitas"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Dev mail catcher: the API delivers to SMTP_HOST=localhost:1025 with
  # SMTP_TLS=none; read messages at http://localhost:8025. Optional — without
  # SMTP_HOST set the API logs outbound mail instead.
  mailpit:
    image: axllent/mailpit
    container_name: civitas-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # web UI

volumes:
  civitas-db-data:
    name: civitas-db-data
